openapi: 3.0.3

# provena-contracts — SPOLJNI API (provena-api ↔ FE / integratori)
# Izvor istine. v2 MVP: suppliers, locations, verify (Whisp), evidence vault.
# Legacy: /v1/uploads/parcels, /v1/jobs (deprecated — koristiti location verify).

info:
  title: Provena API
  description: >
    Compliance platforma za regionalne izvoznike ka EU (supply strana).
    Core engine: dobavljači, lokacije (geo), dokazi (vault), satelitska verify
    (Whisp, stub 2 EUDR), chain-of-custody (lots, događaji, isporuke).
    Compliance paketi (DDS export) i dashboard statusa stub 1/2/3.
  version: 1.0.0

servers:
  - url: https://api.provena.example
    description: produkcija (placeholder)
  - url: http://localhost:8080
    description: lokalni razvoj

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Platform prijava (JWT + refresh cookie)
  - name: system
    description: Health i ops
  - name: suppliers
    description: Registar dobavljača (core)
  - name: locations
    description: Lokacije / geolokacija (core)
  - name: verify
    description: Deforestation-free provera (Whisp, stub 2)
  - name: evidence
    description: Vault dokaza (stub 1 legalnost)
  - name: lots
    description: Chain-of-custody lotovi (stub 3)
  - name: lot-events
    description: Događaji na lotu (ulaz, proces, izlaz, isporuka)
  - name: shipments
    description: Isporuke ka EU kupcu
  - name: packages
    description: Compliance paketi za EU kupca (DDS export, ne TRACES)
  - name: dashboard
    description: Agregat statusa stub 1/2/3 po dobavljaču/lotu
  - name: jobs
    description: "Legacy verify poslovi (deprecated)"
  - name: uploads
    description: "Legacy upload parcela (deprecated)"

paths:
  /v1/auth/login:
    post:
      operationId: authLogin
      summary: Prijava platform korisnika
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Uspešna prijava
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/refresh:
    post:
      operationId: authRefresh
      summary: Osveži access token
      tags: [auth]
      security: []
      responses:
        "200":
          description: Novi access token
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/logout:
    post:
      operationId: authLogout
      summary: Odjava platform korisnika
      tags: [auth]
      security: []
      responses:
        "204":
          description: Uspešna odjava

  /v1/auth/me:
    get:
      operationId: authMe
      summary: Trenutni platform korisnik
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/healthz:
    get:
      operationId: getHealth
      summary: Health check
      tags: [system]
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /v1/suppliers:
    get:
      operationId: listSuppliers
      summary: Lista dobavljača tenant-a
      tags: [suppliers]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createSupplier
      summary: Kreiraj dobavljača
      tags: [suppliers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierRequest"
      responses:
        "201":
          description: Kreirano
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/suppliers/{supplierId}:
    get:
      operationId: getSupplier
      summary: Dobavljač po ID
      tags: [suppliers]
      parameters:
        - $ref: "#/components/parameters/SupplierId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSupplier
      summary: Ažuriraj dobavljača
      tags: [suppliers]
      parameters:
        - $ref: "#/components/parameters/SupplierId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplierRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteSupplier
      summary: Obriši dobavljača
      tags: [suppliers]
      parameters:
        - $ref: "#/components/parameters/SupplierId"
      responses:
        "204":
          description: Obrisano
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/locations:
    get:
      operationId: listLocations
      summary: Lista lokacija
      tags: [locations]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: supplier_id
          in: query
          schema: { type: string, format: uuid }
          description: Filter po dobavljaču
        - name: bbox
          in: query
          schema: { type: string }
          description: "minLon,minLat,maxLon,maxLat (WGS84) za map viewport"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLocation
      summary: Kreiraj lokaciju
      tags: [locations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationRequest"
      responses:
        "201":
          description: Kreirano
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/locations/import:
    post:
      operationId: importLocations
      summary: Bulk import lokacija
      tags: [locations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationImportRequest"
      responses:
        "201":
          description: Kreirano
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationImportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/locations/{locationId}:
    get:
      operationId: getLocation
      summary: Lokacija po ID
      tags: [locations]
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateLocation
      summary: Ažuriraj lokaciju
      tags: [locations]
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteLocation
      summary: Obriši lokaciju
      tags: [locations]
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "204":
          description: Obrisano
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/locations/{locationId}/geometry:
    get:
      operationId: getLocationGeometry
      summary: GeoJSON geometrija lokacije
      tags: [locations]
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: OK
          content:
            application/geo+json:
              schema:
                $ref: "#/components/schemas/GeoJSONGeometry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/locations/{locationId}/verify:
    post:
      operationId: startLocationVerify
      summary: Pokreni Whisp verify za lokaciju
      tags: [verify]
      parameters:
        - $ref: "#/components/parameters/LocationId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartVerifyRequest"
      responses:
        "202":
          description: Verify posao prihvaćen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyJob"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/locations/{locationId}/verify/latest:
    get:
      operationId: getLatestLocationVerify
      summary: Poslednji verify rezultat za lokaciju
      tags: [verify]
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyJobWithResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/verify-jobs/{verifyJobId}:
    get:
      operationId: getVerifyJob
      summary: Status verify posla
      tags: [verify]
      parameters:
        - $ref: "#/components/parameters/VerifyJobId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyJobWithResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/verify-jobs/{verifyJobId}/artifact:
    get:
      operationId: getVerifyJobArtifact
      summary: Preuzmi verify artefakt (PDF)
      tags: [verify]
      parameters:
        - $ref: "#/components/parameters/VerifyJobId"
        - $ref: "#/components/parameters/ArtifactRef"
      responses:
        "200":
          description: Verify artefakt (PDF)
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/evidence:
    get:
      operationId: listEvidence
      summary: Lista dokaza tenant-a
      tags: [evidence]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createEvidence
      summary: Upload novog dokaza
      tags: [evidence]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateEvidenceForm"
      responses:
        "201":
          description: Kreirano
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evidence"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/evidence/{evidenceId}:
    get:
      operationId: getEvidence
      summary: Dokaz po ID
      tags: [evidence]
      parameters:
        - $ref: "#/components/parameters/EvidenceId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evidence"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateEvidence
      summary: Ažuriraj metapodatke dokaza
      tags: [evidence]
      parameters:
        - $ref: "#/components/parameters/EvidenceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEvidenceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evidence"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/evidence/{evidenceId}/versions:
    post:
      operationId: createEvidenceVersion
      summary: Upload nove verzije dokaza
      tags: [evidence]
      parameters:
        - $ref: "#/components/parameters/EvidenceId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Kreirano
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evidence"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/locations/{locationId}/evidence:
    get:
      operationId: listLocationEvidence
      summary: Dokazi vezani za lokaciju
      tags: [evidence]
      parameters:
        - $ref: "#/components/parameters/LocationId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/suppliers/{supplierId}/evidence:
    get:
      operationId: listSupplierEvidence
      summary: Dokazi vezani za dobavljača
      tags: [evidence]
      parameters:
        - $ref: "#/components/parameters/SupplierId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/lots:
    get:
      operationId: listLots
      summary: Lista lotova
      tags: [lots]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/LotStatus" }
      responses:
        "200":
          description: Lista lotova
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLot
      summary: Kreiraj lot
      tags: [lots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLotRequest"
      responses:
        "201":
          description: Lot kreiran
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/lots/{lotId}:
    get:
      operationId: getLot
      summary: Detalji lota
      tags: [lots]
      parameters:
        - $ref: "#/components/parameters/LotId"
      responses:
        "200":
          description: Lot sa bilansom količina
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateLot
      summary: Ažuriraj lot (label, zatvaranje)
      tags: [lots]
      parameters:
        - $ref: "#/components/parameters/LotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLotRequest"
      responses:
        "200":
          description: Lot ažuriran
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteLot
      summary: Obriši lot (samo open, bez događaja)
      tags: [lots]
      parameters:
        - $ref: "#/components/parameters/LotId"
      responses:
        "204":
          description: Obrisano
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/lot-events:
    get:
      operationId: listLotEvents
      summary: Lista događaja na lotovima
      tags: [lot-events]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: lot_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Lista događaja
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotEventList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createLotEvent
      summary: Dodaj događaj na lot
      tags: [lot-events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLotEventRequest"
      responses:
        "201":
          description: Događaj kreiran
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotEvent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/lot-events/{eventId}:
    get:
      operationId: getLotEvent
      summary: Detalji događaja
      tags: [lot-events]
      parameters:
        - $ref: "#/components/parameters/LotEventId"
      responses:
        "200":
          description: Događaj
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LotEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteLotEvent
      summary: Obriši događaj (samo open lot)
      tags: [lot-events]
      parameters:
        - $ref: "#/components/parameters/LotEventId"
      responses:
        "204":
          description: Obrisano
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/shipments:
    get:
      operationId: listShipments
      summary: Lista isporuka
      tags: [shipments]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Lista isporuka
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShipmentList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createShipment
      summary: Kreiraj isporuku
      tags: [shipments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShipmentRequest"
      responses:
        "201":
          description: Isporuka kreirana
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/shipments/{shipmentId}:
    get:
      operationId: getShipment
      summary: Detalji isporuke
      tags: [shipments]
      parameters:
        - $ref: "#/components/parameters/ShipmentId"
      responses:
        "200":
          description: Isporuka
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateShipment
      summary: Ažuriraj isporuku
      tags: [shipments]
      parameters:
        - $ref: "#/components/parameters/ShipmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShipmentRequest"
      responses:
        "200":
          description: Isporuka ažurirana
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteShipment
      summary: Obriši isporuku
      tags: [shipments]
      parameters:
        - $ref: "#/components/parameters/ShipmentId"
      responses:
        "204":
          description: Obrisano
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/packages:
    get:
      operationId: listCompliancePackages
      summary: Lista compliance paketa
      tags: [packages]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: pack
          in: query
          schema: { $ref: "#/components/schemas/CompliancePack" }
      responses:
        "200":
          description: Lista paketa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompliancePackageList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCompliancePackage
      summary: Generiši compliance paket iz lotova
      tags: [packages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompliancePackageRequest"
      responses:
        "201":
          description: Paket kreiran
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompliancePackage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/packages/{packageId}:
    get:
      operationId: getCompliancePackage
      summary: Detalji compliance paketa
      tags: [packages]
      parameters:
        - $ref: "#/components/parameters/PackageId"
      responses:
        "200":
          description: Paket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompliancePackage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCompliancePackage
      summary: Obriši compliance paket
      tags: [packages]
      parameters:
        - $ref: "#/components/parameters/PackageId"
      responses:
        "204":
          description: Obrisano
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/packages/{packageId}/export:
    get:
      operationId: exportCompliancePackage
      summary: Preuzmi DDS export snapshot (JSON)
      tags: [packages]
      parameters:
        - $ref: "#/components/parameters/PackageId"
      responses:
        "200":
          description: JSON snapshot za DDS / arhivu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompliancePackageExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/dashboard/summary:
    get:
      operationId: getDashboardSummary
      summary: Agregat stub 1/2/3 completion po dobavljaču i lotu
      tags: [dashboard]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/uploads/parcels:
    post:
      operationId: uploadParcels
      summary: "Legacy: upload parcela (deprecated)"
      deprecated: true
      tags: [uploads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Parcel"
      responses:
        "201":
          description: Kreirano
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadParcelsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/jobs:
    get:
      operationId: listJobs
      summary: "Legacy: lista verify poslova (deprecated)"
      deprecated: true
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createJob
      summary: "Legacy: kreiraj verify posao (deprecated)"
      deprecated: true
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "202":
          description: Prihvaćeno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/jobs/{jobId}:
    get:
      operationId: getJob
      summary: "Legacy: status posla (deprecated)"
      deprecated: true
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: cancelJob
      summary: "Legacy: otkaži posao (deprecated)"
      deprecated: true
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "204":
          description: Otkazano

  /v1/jobs/{jobId}/retry:
    post:
      operationId: retryJob
      summary: "Legacy: retry posla (deprecated)"
      deprecated: true
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "202":
          description: Prihvaćeno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /v1/jobs/{jobId}/result:
    get:
      operationId: getJobResult
      summary: "Legacy: rezultat posla (deprecated)"
      deprecated: true
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /v1/jobs/{jobId}/artifact:
    get:
      operationId: getJobArtifact
      summary: "Legacy: artefakt posla (deprecated)"
      deprecated: true
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/ArtifactRef"
      responses:
        "200":
          description: Legacy verify artefakt (deprecated)
          content:
            application/octet-stream:
              schema: { type: string, format: binary }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or API key

  parameters:
    JobId:
      name: jobId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SupplierId:
      name: supplierId
      in: path
      required: true
      schema: { type: string, format: uuid }
    LocationId:
      name: locationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VerifyJobId:
      name: verifyJobId
      in: path
      required: true
      schema: { type: string, format: uuid }
    EvidenceId:
      name: evidenceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    LotId:
      name: lotId
      in: path
      required: true
      schema: { type: string, format: uuid }
    LotEventId:
      name: eventId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ShipmentId:
      name: shipmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PackageId:
      name: packageId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ArtifactRef:
      name: ref
      in: query
      required: true
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string, format: date-time }

  responses:
    BadRequest:
      description: Neispravan zahtev
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Nedostaje auth
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Pristup odbijen
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Nije pronađeno
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Konflikt stanja
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooManyRequests:
      description: Kvota / rate limit
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    GeoJSONGeometry:
      type: object
      description: GeoJSON Geometry (WGS84)
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point, Polygon, MultiPolygon, LineString, MultiPoint]
        coordinates: {}

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer }

    UserProfile:
      type: object
      required: [user_id, email, tenant_id]
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        tenant_id: { type: string }

    SupplierStatus:
      type: string
      enum: [active, inactive]

    Supplier:
      type: object
      required: [supplier_id, name, country, status, created_at, updated_at]
      properties:
        supplier_id: { type: string, format: uuid }
        name: { type: string }
        country: { type: string, minLength: 2, maxLength: 2, description: ISO 3166-1 alpha-2 }
        contact_email: { type: string, format: email }
        external_ref: { type: string, description: Opcioni ERP ID }
        status: { $ref: "#/components/schemas/SupplierStatus" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SupplierList:
      type: object
      required: [suppliers]
      properties:
        suppliers:
          type: array
          items: { $ref: "#/components/schemas/Supplier" }
        next_cursor: { type: string, format: date-time }

    CreateSupplierRequest:
      type: object
      required: [name, country]
      properties:
        name: { type: string }
        country: { type: string, minLength: 2, maxLength: 2 }
        contact_email: { type: string, format: email }
        external_ref: { type: string }

    UpdateSupplierRequest:
      type: object
      properties:
        name: { type: string }
        country: { type: string, minLength: 2, maxLength: 2 }
        contact_email: { type: string, format: email }
        external_ref: { type: string }
        status: { $ref: "#/components/schemas/SupplierStatus" }

    LocationSource:
      type: string
      enum: [manual, import, api]

    Location:
      type: object
      required: [location_id, supplier_id, label, geometry, source, created_at, updated_at]
      properties:
        location_id: { type: string, format: uuid }
        supplier_id: { type: string, format: uuid }
        label: { type: string }
        geometry: { $ref: "#/components/schemas/GeoJSONGeometry" }
        area_ha: { type: number, minimum: 0 }
        source: { $ref: "#/components/schemas/LocationSource" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    LocationList:
      type: object
      required: [locations]
      properties:
        locations:
          type: array
          items: { $ref: "#/components/schemas/Location" }
        next_cursor: { type: string, format: date-time }

    CreateLocationRequest:
      type: object
      required: [supplier_id, label, geometry]
      properties:
        supplier_id: { type: string, format: uuid }
        label: { type: string }
        geometry: { $ref: "#/components/schemas/GeoJSONGeometry" }
        area_ha: { type: number, minimum: 0 }

    UpdateLocationRequest:
      type: object
      properties:
        label: { type: string }
        geometry: { $ref: "#/components/schemas/GeoJSONGeometry" }
        area_ha: { type: number, minimum: 0 }

    LocationImportRequest:
      type: object
      required: [supplier_id, format, features]
      properties:
        supplier_id: { type: string, format: uuid }
        format:
          type: string
          enum: [geojson, kml, csv]
        features:
          type: array
          items:
            type: object
            required: [label, geometry]
            properties:
              label: { type: string }
              geometry: { $ref: "#/components/schemas/GeoJSONGeometry" }
              area_ha: { type: number }

    LocationImportResponse:
      type: object
      required: [imported_count, locations]
      properties:
        imported_count: { type: integer }
        locations:
          type: array
          items: { $ref: "#/components/schemas/Location" }

    VerifyJobStatus:
      type: string
      enum: [pending, processing, done, needs_review, error]

    Verdict:
      type: string
      enum: [deforestation_free, loss_detected, needs_review]

    StartVerifyRequest:
      type: object
      properties:
        baseline_date:
          type: string
          format: date
          default: "2020-12-31"

    VerifyJob:
      type: object
      required: [verify_job_id, location_id, status, created_at]
      properties:
        verify_job_id: { type: string, format: uuid }
        location_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/VerifyJobStatus" }
        baseline_date: { type: string, format: date }
        created_at: { type: string, format: date-time }

    VerifyResult:
      type: object
      properties:
        verdict: { $ref: "#/components/schemas/Verdict" }
        confidence: { type: number, minimum: 0, maximum: 1 }
        checked_at: { type: string, format: date-time }
        report_ref: { type: string }
        provider:
          type: string
          enum: [whisp]
          default: whisp

    VerifyJobWithResult:
      allOf:
        - $ref: "#/components/schemas/VerifyJob"
        - type: object
          properties:
            result: { $ref: "#/components/schemas/VerifyResult" }

    EvidenceLinkType:
      type: string
      enum: [location, supplier, lot]

    EvidenceLink:
      type: object
      required: [type, id]
      properties:
        type: { $ref: "#/components/schemas/EvidenceLinkType" }
        id: { type: string, format: uuid }

    Evidence:
      type: object
      required: [evidence_id, kind, title, version, linked_to, storage_ref, uploaded_at]
      properties:
        evidence_id: { type: string, format: uuid }
        kind:
          type: string
          description: Pack-specifično; wood pack vidi packs/wood/fields.json
        title: { type: string }
        expires_at: { type: string, format: date }
        linked_to: { $ref: "#/components/schemas/EvidenceLink" }
        storage_ref: { type: string }
        version: { type: integer, minimum: 1 }
        uploaded_at: { type: string, format: date-time }

    EvidenceList:
      type: object
      required: [evidence]
      properties:
        evidence:
          type: array
          items: { $ref: "#/components/schemas/Evidence" }
        next_cursor: { type: string, format: date-time }

    CreateEvidenceForm:
      type: object
      required: [file, kind, title, linked_to]
      properties:
        file: { type: string, format: binary }
        kind: { type: string }
        title: { type: string }
        expires_at: { type: string, format: date }
        linked_to:
          type: string
          description: JSON string EvidenceLink objekta

    UpdateEvidenceRequest:
      type: object
      properties:
        title: { type: string }
        kind: { type: string }
        expires_at: { type: string, format: date }

    LotStatus:
      type: string
      enum: [open, closed]

    LotBalance:
      type: object
      required: [unit, received, output, remaining]
      properties:
        unit: { type: string, description: "Jedinica mere (npr. m3/ex, kg — pack-specifično)" }
        received: { type: number, minimum: 0 }
        output: { type: number, minimum: 0 }
        remaining: { type: number, description: "received − output" }

    Lot:
      type: object
      required: [lot_id, label, status, created_at, updated_at]
      properties:
        lot_id: { type: string, format: uuid }
        label: { type: string }
        status: { $ref: "#/components/schemas/LotStatus" }
        balance: { $ref: "#/components/schemas/LotBalance" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    LotList:
      type: object
      required: [lots]
      properties:
        lots:
          type: array
          items: { $ref: "#/components/schemas/Lot" }
        next_cursor: { type: string, format: date-time }

    CreateLotRequest:
      type: object
      required: [label]
      properties:
        label: { type: string }

    UpdateLotRequest:
      type: object
      properties:
        label: { type: string }
        status: { $ref: "#/components/schemas/LotStatus" }

    LotEventKind:
      type: string
      enum: [receipt, process, output, shipment]

    LotEvent:
      type: object
      required: [event_id, lot_id, kind, quantity, unit, occurred_at, created_at]
      properties:
        event_id: { type: string, format: uuid }
        lot_id: { type: string, format: uuid }
        kind: { $ref: "#/components/schemas/LotEventKind" }
        quantity: { type: number, minimum: 0, exclusiveMinimum: true }
        unit: { type: string }
        location_id: { type: string, format: uuid }
        supplier_id: { type: string, format: uuid }
        shipment_id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true
          description: Pack-specifična polja (vidi packs/*/fields.json)
        created_at: { type: string, format: date-time }

    LotEventList:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items: { $ref: "#/components/schemas/LotEvent" }
        next_cursor: { type: string, format: date-time }

    CreateLotEventRequest:
      type: object
      required: [lot_id, kind, quantity, unit, occurred_at]
      properties:
        lot_id: { type: string, format: uuid }
        kind: { $ref: "#/components/schemas/LotEventKind" }
        quantity: { type: number, minimum: 0, exclusiveMinimum: true }
        unit: { type: string }
        location_id: { type: string, format: uuid }
        supplier_id: { type: string, format: uuid }
        shipment_id: { type: string, format: uuid }
        occurred_at: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true

    Shipment:
      type: object
      required: [shipment_id, destination, shipped_at, lot_ids, created_at, updated_at]
      properties:
        shipment_id: { type: string, format: uuid }
        destination: { type: string, description: "EU kupac / destinacija" }
        shipped_at: { type: string, format: date-time }
        lot_ids:
          type: array
          items: { type: string, format: uuid }
          minItems: 1
        external_ref: { type: string, description: "Opcioni ERP / otpremnica ref" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ShipmentList:
      type: object
      required: [shipments]
      properties:
        shipments:
          type: array
          items: { $ref: "#/components/schemas/Shipment" }
        next_cursor: { type: string, format: date-time }

    CreateShipmentRequest:
      type: object
      required: [destination, shipped_at, lot_ids]
      properties:
        destination: { type: string }
        shipped_at: { type: string, format: date-time }
        lot_ids:
          type: array
          items: { type: string, format: uuid }
          minItems: 1
        external_ref: { type: string }

    UpdateShipmentRequest:
      type: object
      properties:
        destination: { type: string }
        shipped_at: { type: string, format: date-time }
        lot_ids:
          type: array
          items: { type: string, format: uuid }
          minItems: 1
        external_ref: { type: string }

    CompliancePack:
      type: string
      enum: [wood]
      description: Pack vertikala; core je neutralan, terminologija u packs/*/fields.json

    CompliancePackageStatus:
      type: string
      enum: [ready, exported]

    CompliancePackage:
      type: object
      required: [package_id, pack, status, lot_ids, evidence_ids, verify_job_ids, export_ref, created_at, updated_at]
      properties:
        package_id: { type: string, format: uuid }
        label: { type: string }
        pack: { $ref: "#/components/schemas/CompliancePack" }
        status: { $ref: "#/components/schemas/CompliancePackageStatus" }
        lot_ids:
          type: array
          items: { type: string, format: uuid }
          minItems: 1
        shipment_id: { type: string, format: uuid }
        evidence_ids:
          type: array
          items: { type: string, format: uuid }
        verify_job_ids:
          type: array
          items: { type: string, format: uuid }
        export_ref: { type: string, description: Interni ref za preuzimanje snapshot-a }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CompliancePackageList:
      type: object
      required: [packages]
      properties:
        packages:
          type: array
          items: { $ref: "#/components/schemas/CompliancePackage" }
        next_cursor: { type: string, format: date-time }

    CreateCompliancePackageRequest:
      type: object
      required: [pack, lot_ids]
      properties:
        label: { type: string }
        pack: { $ref: "#/components/schemas/CompliancePack" }
        lot_ids:
          type: array
          items: { type: string, format: uuid }
          minItems: 1
        shipment_id: { type: string, format: uuid, description: Opciona veza sa isporukom }

    CompliancePackageExport:
      type: object
      required: [package_id, pack, generated_at, lots, evidence, verify_results]
      description: Snapshot za DDS arhivu / ručni unos (ne TRACES API)
      properties:
        package_id: { type: string, format: uuid }
        pack: { $ref: "#/components/schemas/CompliancePack" }
        label: { type: string }
        generated_at: { type: string, format: date-time }
        shipment:
          $ref: "#/components/schemas/Shipment"
        lots:
          type: array
          items: { $ref: "#/components/schemas/Lot" }
        lot_events:
          type: array
          items: { $ref: "#/components/schemas/LotEvent" }
        evidence:
          type: array
          items: { $ref: "#/components/schemas/Evidence" }
        verify_results:
          type: array
          items: { $ref: "#/components/schemas/VerifyJobWithResult" }
        suppliers:
          type: array
          items: { $ref: "#/components/schemas/Supplier" }
        locations:
          type: array
          items: { $ref: "#/components/schemas/Location" }

    StubCompletion:
      type: object
      required: [complete, total, percent]
      properties:
        complete: { type: integer, minimum: 0 }
        total: { type: integer, minimum: 0 }
        percent: { type: number, minimum: 0, maximum: 100 }

    SupplierComplianceRow:
      type: object
      required: [supplier_id, name, legal, deforestation_free, traceability]
      properties:
        supplier_id: { type: string, format: uuid }
        name: { type: string }
        location_count: { type: integer, minimum: 0 }
        legal: { $ref: "#/components/schemas/StubCompletion" }
        deforestation_free: { $ref: "#/components/schemas/StubCompletion" }
        traceability: { $ref: "#/components/schemas/StubCompletion" }

    LotComplianceRow:
      type: object
      required: [lot_id, label, status, legal, deforestation_free, traceability]
      properties:
        lot_id: { type: string, format: uuid }
        label: { type: string }
        status: { $ref: "#/components/schemas/LotStatus" }
        legal: { $ref: "#/components/schemas/StubCompletion" }
        deforestation_free: { $ref: "#/components/schemas/StubCompletion" }
        traceability: { $ref: "#/components/schemas/StubCompletion" }

    DashboardSummary:
      type: object
      required: [generated_at, overall, suppliers, lots]
      properties:
        generated_at: { type: string, format: date-time }
        overall:
          type: object
          required: [legal, deforestation_free, traceability]
          properties:
            legal: { $ref: "#/components/schemas/StubCompletion" }
            deforestation_free: { $ref: "#/components/schemas/StubCompletion" }
            traceability: { $ref: "#/components/schemas/StubCompletion" }
        suppliers:
          type: array
          items: { $ref: "#/components/schemas/SupplierComplianceRow" }
        lots:
          type: array
          items: { $ref: "#/components/schemas/LotComplianceRow" }

    Parcel:
      type: object
      required: [id, geometry]
      properties:
        id: { type: string }
        geometry: { type: object, additionalProperties: true }

    UploadParcelsResponse:
      type: object
      required: [parcels_ref]
      properties:
        parcels_ref: { type: string }

    CreateJobRequest:
      type: object
      required: [parcels_ref]
      properties:
        parcels_ref: { type: string }
        baseline_date: { type: string, format: date, default: "2020-12-31" }
        params: { type: object, additionalProperties: true }

    JobStatus:
      type: string
      enum: [pending, processing, done, needs_review, error]

    Job:
      type: object
      required: [job_id, status]
      properties:
        job_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/JobStatus" }
        created_at: { type: string, format: date-time }

    JobList:
      type: object
      required: [jobs]
      properties:
        jobs:
          type: array
          items: { $ref: "#/components/schemas/Job" }
        next_cursor: { type: string, format: date-time }

    ParcelResult:
      type: object
      required: [parcel_id, verdict, confidence]
      properties:
        parcel_id: { type: string }
        verdict: { $ref: "#/components/schemas/Verdict" }
        confidence: { type: number }
        report_ref: { type: string }
        export_ref: { type: string }

    Result:
      type: object
      required: [job_id, status, parcels]
      properties:
        job_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/JobStatus" }
        parcels:
          type: array
          items: { $ref: "#/components/schemas/ParcelResult" }
        summary_ref: { type: string }
        method_version: { type: string }

openapi: 3.0.3

# ─────────────────────────────────────────────────────────────────────────────
# provena-contracts — SPOLJNI API (provena-api ↔ kupci / konsultanti)
#
# Ovo je IZVOR ISTINE za HTTP/REST ugovor. provena-api implementira ovaj spec;
# klijentski SDK-ovi se GENERIŠU iz njega (vidi README). Ne menjaj klijente ručno.
#
# Za UNUTRAŠNJU granicu (api ↔ worker preko reda poslova) vidi schemas/*.json —
# OpenAPI ne pokriva asinhrone poruke.
# ─────────────────────────────────────────────────────────────────────────────

info:
  title: Provena API
  description: >
    Satelitska verifikacija da parcela nije krčena posle baseline datuma
    (EUDR). Klijent prvo uploaduje parcele, zatim kreira posao sa parcels_ref;
    sistem vraća audit-spreman dokaz po parceli.
  version: 0.4.0   # contract version — bump na svaku promenu; CI obara breaking promene

servers:
  - url: https://api.provena.example
    description: produkcija (placeholder)
  - url: http://localhost:8080
    description: lokalni razvoj

# Faza B: API ključ preko Authorization Bearer; healthz ostaje javan.
security:
  - bearerAuth: []

paths:
  /v1/auth/login:
    post:
      operationId: authLogin
      summary: Prijava platform korisnika
      description: >
        Vraća kratkotrajni JWT access token u telu odgovora. Refresh token se
        postavlja kao HttpOnly cookie (provena_refresh).
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Uspešna prijava
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/refresh:
    post:
      operationId: authRefresh
      summary: Osveži access token
      description: >
        Čita refresh token iz HttpOnly cookie-a, rotira ga i vraća novi access
        token. Zahteva credentials: include na klijentu.
      tags: [auth]
      security: []
      responses:
        "200":
          description: Novi access token
          headers:
            Set-Cookie:
              description: Rotirani HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/logout:
    post:
      operationId: authLogout
      summary: Odjava platform korisnika
      description: Opoziva refresh token i briše cookie. Prihvata JWT access ili refresh cookie.
      tags: [auth]
      security: []
      responses:
        "204":
          description: Uspešna odjava
          headers:
            Set-Cookie:
              description: Brisanje refresh cookie-a
              schema:
                type: string

  /v1/auth/me:
    get:
      operationId: authMe
      summary: Trenutni platform korisnik
      tags: [auth]
      responses:
        "200":
          description: Profil prijavljenog korisnika
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/healthz:
    get:
      operationId: getHealth
      summary: Health check
      tags: [system]
      security: []
      responses:
        "200":
          description: Servis radi
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /v1/uploads/parcels:
    post:
      operationId: uploadParcels
      summary: Upload liste parcela u skladište
      description: >
        Prvi korak dvo-koračnog toka: klijent šalje JSON niz parcela (GeoJSON
        geometrija). Odgovor sadrži parcels_ref — ključ u deljenom skladištu
        koji se prosleđuje u POST /v1/jobs.
      tags: [uploads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Parcel"
      responses:
        "201":
          description: Parcele uspešno uploadovane
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadParcelsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/jobs:
    get:
      operationId: listJobs
      summary: Lista poslova tenant-a
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Lista poslova
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createJob
      summary: Predaj posao verifikacije (referenca na uploadovane parcele)
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "202":
          description: Posao prihvaćen i stavljen u red
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/jobs/{jobId}:
    get:
      operationId: getJob
      summary: Status posla
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Trenutni status posla
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: cancelJob
      summary: Otkaži posao na čekanju
      description: Dozvoljeno samo dok je status pending.
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "204":
          description: Posao otkazan
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/jobs/{jobId}/retry:
    post:
      operationId: retryJob
      summary: Ponovo stavi posao u red
      description: Dozvoljeno samo za poslove u statusu error.
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "202":
          description: Posao ponovo stavljen u red
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/jobs/{jobId}/result:
    get:
      operationId: getJobResult
      summary: Rezultat posla (dokazi po parceli)
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Rezultat verifikacije
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/jobs/{jobId}/artifact:
    get:
      operationId: getJobArtifact
      summary: Preuzmi artefakt iz skladišta
      description: >
        Vraća sadržaj fajla iz deljenog skladišta. Query parametar `ref` mora biti
        jedan od report_ref, export_ref ili summary_ref iz GET /v1/jobs/{jobId}/result.
      tags: [jobs]
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/ArtifactRef"
      responses:
        "200":
          description: Sadržaj artefakta (PDF, GeoJSON, CSV, …)
          content:
            application/geo+json:
              schema:
                type: object
            application/pdf:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or API key
      description: >
        API ključ tenant-a (prov_…) ili JWT access token platform korisnika.
        Šalje se kao Authorization: Bearer <token>.

  parameters:
    JobId:
      name: jobId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ArtifactRef:
      name: ref
      in: query
      required: true
      schema:
        type: string
      description: Storage ključ artefakta (report_ref, export_ref ili summary_ref iz rezultata)
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Maksimalan broj poslova u odgovoru
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Vrati poslove starije od ovog created_at (paginacija)

  responses:
    BadRequest:
      description: Neispravan zahtev
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Nedostaje ili je nevažeći API ključ / JWT access token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Pristup odbijen (npr. parcels_ref drugog tenant-a)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Nije pronađeno
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Konflikt stanja (npr. posao još nije gotov)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooManyRequests:
      description: Prekoračena kvota aktivnih poslova ili rate limit
      headers:
        Retry-After:
          description: Sekunde do ponovnog pokušaja (rate limit)
          schema:
            type: integer
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: Kratkotrajni JWT access token
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Sekunde do isteka access tokena
          example: 900

    UserProfile:
      type: object
      required: [user_id, email, tenant_id]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        tenant_id:
          type: string

    Verdict:
      type: string
      description: Ishod verifikacije za parcelu
      enum: [deforestation_free, loss_detected, needs_review]

    JobStatus:
      type: string
      enum: [pending, processing, done, needs_review, error]

    Parcel:
      type: object
      required: [id, geometry]
      properties:
        id:
          type: string
          description: Identifikator parcele u okviru posla
        geometry:
          type: object
          description: GeoJSON Geometry objekat (Point, Polygon, MultiPolygon, …)
          additionalProperties: true

    UploadParcelsResponse:
      type: object
      required: [parcels_ref]
      properties:
        parcels_ref:
          type: string
          description: Ključ uploadovanog fajla parcela u deljenom skladištu

    CreateJobRequest:
      type: object
      required: [parcels_ref]
      properties:
        parcels_ref:
          type: string
          description: Ključ ulaznog fajla parcela u skladištu (iz POST /v1/uploads/parcels)
        baseline_date:
          type: string
          format: date
          default: "2020-12-31"
          description: Referentni datum (EUDR pravila se menjaju — konfigurabilno)
        params:
          type: object
          additionalProperties: true
          description: Opcioni parametri analize (npr. prag pouzdanosti)

    Job:
      type: object
      required: [job_id, status]
      properties:
        job_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/JobStatus" }
        created_at: { type: string, format: date-time }

    JobList:
      type: object
      required: [jobs]
      properties:
        jobs:
          type: array
          items: { $ref: "#/components/schemas/Job" }
        next_cursor:
          type: string
          format: date-time
          description: Cursor za sledeću stranicu; izostavljen ako nema više rezultata

    ParcelResult:
      type: object
      required: [parcel_id, verdict, confidence]
      properties:
        parcel_id: { type: string }
        verdict: { $ref: "#/components/schemas/Verdict" }
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Ocena pouzdanosti (0–1)
        report_ref:
          type: string
          description: Ključ PDF dokaza u skladištu
        export_ref:
          type: string
          description: Ključ mašinski-čitljivog izvoza (CSV/GeoJSON)

    Result:
      type: object
      required: [job_id, status, parcels]
      properties:
        job_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/JobStatus" }
        parcels:
          type: array
          items: { $ref: "#/components/schemas/ParcelResult" }
        summary_ref:
          type: string
          description: Ključ zbirnog izveštaja u skladištu
        method_version:
          type: string
          description: Verzija analitičkog metoda (radi reproducibilnosti)

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
